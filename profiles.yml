jaffleshop:
  target: snowflake
  outputs:
    snowflake:
      type: snowflake
      account: '{{ env_var("SNOWFLAKE_ACCOUNT") }}'
      user: '{{ env_var("SNOWFLAKE_USER") }}'
      password: '{{ env_var("SNOWFLAKE_PASSWORD") }}'
      database: '{{ env_var("ENV") }}_DBT_DB'
      schema: '{{ env_var("ENV") }}_DBT_SC'
      threads: 8
      client_session_keep_alive: False
      query_tag: 'DBT_JAFFLESHOP_{{ env_var("ENV") }}'
